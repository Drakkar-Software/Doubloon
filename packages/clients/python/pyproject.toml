[project]
name = "doubloon"
version = "0.1.0"
description = "Doubloon Python client for on-chain entitlement verification"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
solana = ["solders>=0.21.0", "solana>=0.34.0"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24.0", "mypy>=1.11.0"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
